<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web 德州扑克 - 巅峰版</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background-color: #1a1a2e; 
            color: white; 
            margin: 0; 
            width: 100vw;
            height: 100dvh;
            overflow: hidden; 
            position: fixed; 
            top: 0; 
            left: 0;
            touch-action: none; 
        }
        #login-screen { position: absolute; width: 100vw; height: 100vh; background: #16213e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #login-screen input { padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 20px; text-align: center; width: 80%; max-width: 300px;}
        #login-screen button { padding: 15px 30px; font-size: 18px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #login-error-msg { color: #e74c3c; font-weight: bold; margin-bottom: 10px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; padding: 20px; border-radius: 10px; z-index: 200; border: 2px solid #e74c3c; text-align: center; width: 80%; max-width: 300px;}
        .modal input { display: block; width: 80%; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; }
        .modal button { margin-top: 15px; background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;}
        #btn-close-modal { background: #95a5a6; margin-left: 10px; }
        #game-screen { display: none; width: 100%; height: 100%; position: relative; }
        
        /* 👉 核心修改 1：奖池改为居中隐藏的弹窗样式 */
        #pot-container { 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0.5); 
            opacity: 0; 
            pointer-events: none; 
            z-index: 300; 
            background: rgba(22, 33, 62, 0.95); 
            padding: 20px 40px; 
            border-radius: 20px; 
            border: 3px solid #f1c40f; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        /* 当被激活时放大显示 */
        #pot-container.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
            pointer-events: auto;
        }
        .pot { font-size: clamp(20px, 3.5vw, 30px); color: #f1c40f; font-weight: bold; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .stage { color: #ecf0f1; font-size: clamp(14px, 2vw, 18px); font-weight: bold; opacity: 0.9;}

        /* 桌子中央的浅色提示文字 */
        .table-hint {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.4);
            font-size: clamp(12px, 2vw, 16px);
            font-weight: bold;
            pointer-events: none;
            z-index: 1;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        #leaderboard-container { position: fixed; top: 90px; left: 20px; z-index: 100; background: rgba(22, 33, 62, 0.85); padding: 10px; border-radius: 12px; border: 2px solid #3498db; box-shadow: 0 5px 20px rgba(0,0,0,0.6); color: white; width: max-content; min-width: 120px; transition: all 0.3s; }
        .lb-title { font-weight: bold; margin-bottom: 5px; text-align: center; color: #3498db; font-size: 14px; }
        .lb-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
        .lb-table th { color: #f1c40f; border-bottom: 1px solid #444; padding-bottom: 3px; }
        .lb-table td { padding-top: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .poker-table { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 85vw; max-width: 900px; height: 45vw; max-height: 450px; background: #27ae60; border-radius: 50%; border: clamp(5px, 1.5vw, 15px) solid #2c3e50; box-shadow: 0 0 clamp(10px, 4vw, 50px) rgba(0,0,0,0.5) inset; cursor: pointer; /* 增加鼠标手势暗示可点击 */ }
        
        #deck-container { position: absolute; top: 25%; left: 65%; transform: translate(-50%, -50%); z-index: 4; }
        .deck-card { position: absolute; box-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        .deck-card:nth-child(1) { transform: rotate(-5deg); top: 0; left: 0; }
        .deck-card:nth-child(2) { transform: rotate(2deg); top: -2px; left: -1px; }
        .deck-card:nth-child(3) { transform: rotate(-2deg); top: -4px; left: -2px; position: relative;}

        .community-cards { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: clamp(3px, 1vw, 10px); z-index: 5;}
        .card-slot { width: clamp(40px, 6vw, 60px); height: clamp(56px, 8.5vw, 85px); border: 2px dashed rgba(255,255,255,0.2); border-radius: 5px; }
        .card { width: clamp(40px, 6vw, 60px); height: clamp(56px, 8.5vw, 85px); background: white; border-radius: 5px; color: black; font-size: clamp(14px, 2vw, 20px); font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .card.red { color: #e74c3c; }
        .card.hidden-bg { background: #2980b9; border: 2px solid white; background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,.2) 5px, rgba(255,255,255,.2) 10px); color: transparent;}
        .flying-card { position: absolute; z-index: 100; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }

        .chip-token { position: absolute; width: clamp(20px, 3.5vw, 30px); height: clamp(20px, 3.5vw, 30px); border-radius: 50%; border: 3px dashed rgba(255,255,255,0.7); box-shadow: 2px 2px 5px rgba(0,0,0,0.6), inset 0 0 5px rgba(0,0,0,0.5); color: white; font-size: clamp(8px, 1.2vw, 12px); font-weight: bold; display: flex; justify-content: center; align-items: center; z-index: 6; animation: throwIn 0.3s ease-out forwards; }
        @keyframes throwIn { 0% { opacity: 0; transform: translate(-50%, -50%) scale(2) translateY(-30px); } 100% { opacity: 1; transform: translate(-50%, -50%) rotate(var(--rot)); } }

        .float-money { position: absolute; color: #2ecc71; font-weight: bold; font-size: clamp(24px, 4vw, 32px); top: -20px; left: 50%; transform: translate(-50%, 0); text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 100; animation: floatMoneyAnim 1.5s ease-out forwards; pointer-events: none; }
        @keyframes floatMoneyAnim { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -80px) scale(1.2); } }

        .seat { position: absolute; width: clamp(80px, 12vw, 130px); text-align: center; transform: translate(-50%, -50%); z-index: 10; cursor: default;}
        .seat-0 { top: 100%; left: 50%; } 
        .seat-1 { top: 85%; left: 10%; } 
        .seat-2 { top: 50%; left: 0%; } 
        .seat-3 { top: 15%; left: 10%; } 
        .seat-4 { top: 0%; left: 50%; } 
        .seat-5 { top: 15%; left: 90%; } 
        .seat-6 { top: 50%; left: 100%; } 
        .seat-7 { top: 85%; left: 90%; } 

        .player-panel { position: relative; background: #34495e; padding: clamp(5px, 1vw, 10px); border-radius: 10px; border: 3px solid transparent; transition: all 0.3s; z-index: 15; cursor: pointer;}
        .player-panel.active-turn { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; transform: scale(1.05); }
        .player-basic { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .avatar { font-size: clamp(25px, 4vw, 40px); margin: 0; }
        .chips { font-size: clamp(12px, 1.5vw, 14px); color: #f1c40f; margin-top: 5px; font-weight: bold;}
        
        .player-details { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.4); opacity: 0; pointer-events: none; background: rgba(22, 33, 62, 0.95); border: 2px solid #3498db; border-radius: 12px; padding: 15px; z-index: 200; min-width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .player-panel.expanded .player-details { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
        .details-avatar { font-size: 45px; margin-bottom: 5px; }
        .details-name { font-size: 16px; font-weight: bold; color: white; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .details-info { font-size: 13px; color: #bdc3c7; line-height: 1.6; text-align: left;}
        .details-info span { color: #f1c40f; font-weight: bold; }

        .role-badge { position: absolute; top: -10px; right: -10px; color: white; padding: 2px 6px; border-radius: 12px; font-size: clamp(10px, 1.2vw, 12px); font-weight: bold; border: 2px solid #2c3e50; z-index: 25;}
        .role-badge.dealer { background: #f1c40f; color: black; } .role-badge.sb { background: #3498db; } .role-badge.bb { background: #e74c3c; }
        .crown { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: clamp(20px, 3.5vw, 35px); text-shadow: 0 0 15px gold; animation: floatCrown 1.5s ease-in-out infinite; z-index: 20; }
        @keyframes floatCrown { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }

        .hole-cards { display: flex; justify-content: center; gap: 2px; margin-top: -15px; z-index: 10; position: relative; }
        .hole-cards .card { width: clamp(30px, 4.5vw, 45px); height: clamp(43px, 6.5vw, 65px); font-size: clamp(12px, 1.5vw, 16px); margin: 0; } 
        
        .flip-container { perspective: 1000px; }
        .my-card-container { cursor: pointer; }
        .flip-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .flip-container.peeked .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 5px; display: flex; justify-content: center; align-items: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .flip-front { background: #2980b9; border: 2px solid white; background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,.2) 5px, rgba(255,255,255,.2) 10px); } 
        .flip-back { background: white; transform: rotateY(180deg); font-weight: bold; } 

        .chat-bubble { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 5px 10px; border-radius: 10px; font-size: 14px; font-weight: bold; white-space: nowrap; margin-bottom: 10px; animation: popIn 0.3s ease; z-index: 50; }
        .chat-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: white transparent transparent transparent; }
        @keyframes popIn { 0% { transform: translateX(-50%) scale(0); } 100% { transform: translateX(-50%) scale(1); } }

        #control-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; z-index: 100; width: max-content;}
        #control-bar button { padding: 10px 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold;}
        
        #chat-input-area { position: fixed; bottom: 90px; left: 20px; display: flex; gap: 10px; z-index: 100;}
        #chat-input-area input { padding: 10px; border-radius: 20px; border: none; outline: none; width: 150px;}
        #chat-input-area button { padding: 10px 15px; border-radius: 20px; border: none; background: #3498db; color: white; cursor: pointer;}

        @media (max-width: 768px) {
            .poker-table { width: 80vw; height: 120vw; max-height: 55vh; border-radius: 120px; }
            #leaderboard-container { top: 60px; left: 10px; padding: 5px 10px; }
            #deck-container { top: 15%; left: 50%; } 
            
            /* 手机端奖池弹出时稍微缩小一点，避免占满屏幕 */
            #pot-container.show { transform: translate(-50%, -50%) scale(1); }

            .seat-1 { top: 85%; left: 0%; } 
            .seat-2 { top: 50%; left: -5%; } 
            .seat-3 { top: 15%; left: 0%; } 
            .seat-5 { top: 15%; left: 100%; } 
            .seat-6 { top: 50%; left: 105%; } 
            .seat-7 { top: 85%; left: 100%; } 

            #control-bar { width: 100vw; flex-wrap: nowrap; justify-content: center; bottom: 5px; padding: 5px; box-sizing: border-box; }
            #control-bar button { padding: 8px 5px; font-size: 14px; flex: 1 1 auto; margin: 2px; } 
            #chat-input-area { bottom: 85px; top: auto; left: 5vw; width: 90vw; justify-content: space-between; transform: none; box-sizing: border-box;} 
            #chat-input-area input { flex: 1; min-width: 0; padding: 8px; margin: 0 5px; }
            #chat-input-area button, #btn-quick-chat { padding: 8px 10px; font-size: 13px; white-space: nowrap; }
            #top-bar { top: 10px; right: 10px; }
            #top-bar button { padding: 6px 10px; font-size: 12px; }
        }

        #btn-quick-chat { background: #e67e22; color: white; }
        #quick-chat-menu { display: none; position: absolute; bottom: 100%; left: 0; background: rgba(22, 33, 62, 0.95); border: 2px solid #3498db; border-radius: 10px; padding: 10px; flex-direction: column; gap: 8px; min-width: 220px; margin-bottom: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); max-height: 250px; overflow-y: auto; z-index: 101; }
        .quick-chat-item { background: #2c3e50; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; text-align: left; transition: background 0.2s; font-size: 14px; }
        .quick-chat-item:hover { background: #3498db; }
        @media (max-width: 768px) { #quick-chat-menu { left: 50%; transform: translateX(-50%); min-width: 200px; } }
    </style>
</head>
<body>
    <div id="login-screen">
        <h1 style="font-size: 40px; margin-bottom: 30px;">♠️ Web 德州扑克 ♥️</h1>
        <p id="login-error-msg"></p>
        <input type="text" id="username" placeholder="输入预设账号">
        <input type="password" id="password" placeholder="输入密码">
        <button onclick="joinGame()">登录游戏</button>
    </div>

    <div id="top-bar" style="display: none; position: absolute; top: 10px; right: 10px; z-index: 100;">
        <button onclick="document.getElementById('password-modal').style.display='block'" style="background: #e67e22; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">⚙️ 修改密码</button>
    </div>

    <div id="password-modal" class="modal">
        <h3 style="margin-top: 0; color: #f1c40f;">修改我的密码</h3>
        <input type="password" id="old-pwd" placeholder="原密码">
        <input type="password" id="new-pwd" placeholder="新密码">
        <button onclick="changePassword()">确认修改</button>
        <button id="btn-close-modal" onclick="document.getElementById('password-modal').style.display='none'">取消</button>
    </div>

    <div id="game-screen">
        <div id="pot-container">
            <div class="pot">🏆 奖池: $<span id="pot-display">0</span></div>
            <div class="stage" id="stage-display">等待开始...</div>
        </div>

        <div class="poker-table">
            <div class="table-hint">👆 点击桌面查看奖池</div>

            <div id="deck-container">
                <div class="card hidden-bg deck-card"></div><div class="card hidden-bg deck-card"></div><div class="card hidden-bg deck-card"></div>
            </div>
            <div id="chips-container" style="position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 6;"></div>
            
            <div class="community-cards" id="community-cards-container">
                <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
            </div>
            
            <div id="seat-0" class="seat seat-0"></div><div id="seat-1" class="seat seat-1"></div>
            <div id="seat-2" class="seat seat-2"></div><div id="seat-3" class="seat seat-3"></div>
            <div id="seat-4" class="seat seat-4"></div><div id="seat-5" class="seat seat-5"></div>
            <div id="seat-6" class="seat seat-6"></div><div id="seat-7" class="seat seat-7"></div>
        </div>
        
        <div id="chat-input-area">
            <button id="btn-quick-chat" onclick="toggleQuickChat()">💬 快捷</button>
            <input type="text" id="chat-input" placeholder="嘲讽一下...">
            <button onclick="sendChat()">发送</button>
            <div id="quick-chat-menu"></div>
        </div>
        <div id="control-bar"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        window.addEventListener('DOMContentLoaded', () => {
            initQuickChat(); 
            const chatInput = document.getElementById('chat-input');
            if (chatInput) {
                chatInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') { e.preventDefault(); sendChat(); }
                });
            }

            // 👉 核心修改 2：监听全局点击事件，控制奖池的显示与隐藏
            document.addEventListener('click', function(e) {
                const potEl = document.getElementById('pot-container');
                if (!potEl) return;
                
                // 判断点击的是否在牌桌内，并且不是点击在了玩家的座位上
                if (e.target.closest('.poker-table') && !e.target.closest('.seat')) {
                    potEl.classList.add('show');
                } 
                // 如果点击了除了奖池本身之外的任何其他区域（比如黑色背景、按钮），就隐藏
                else if (!e.target.closest('#pot-container')) {
                    potEl.classList.remove('show');
                }
            });
        });

        let isChatCooldown = false;
        const CHAT_COOLDOWN_TIME = 3000; 

        // 快捷语音配置
        const quickChatConfig = [
            { text: "快点吧，我等到花儿都谢了！", audioUrl: "./audio/配音文件.mp3" },
            { text: "交个朋友吧，加个微信？", audioUrl: "./audio/2.mp3" },
            { text: "不要走，决战到天亮！", audioUrl: "./audio/3.mp3" },
            { text: "这把牌我看好你哦~", audioUrl: "./audio/4.mp3" },
            { text: "赢了会所嫩模，输了下海干活！", audioUrl: "./audio/5.mp3" },
            { text: "我要验牌！", audioUrl: "./audio/6.mp3" ,volume: 0.6 },
            { text: "给我擦皮鞋！", audioUrl: "./audio/7.mp3" }
        ];

        const audioCache = {};
        function initQuickChat() {
            const menu = document.getElementById('quick-chat-menu');
            quickChatConfig.forEach(item => {
                if (item.audioUrl) {
                    let audio = new Audio(item.audioUrl);
                    audio.volume = item.volume !== undefined ? item.volume : 1.0; 
                    audioCache[item.text] = audio;
                }
                let btn = document.createElement('button');
                btn.className = 'quick-chat-item';
                btn.innerText = item.text;
                btn.onclick = () => {
                    if (!isChatCooldown) { sendChat(item.text); toggleQuickChat(); } 
                    else {
                        const oldBg = btn.style.background;
                        btn.style.background = '#e74c3c';
                        btn.innerText = '⏳ 冷却中...';
                        setTimeout(() => { btn.style.background = ''; btn.innerText = item.text; }, 1000);
                    }
                };
                menu.appendChild(btn);
            });
        }

        function toggleQuickChat() {
            const menu = document.getElementById('quick-chat-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        let mySeatIndex = -1; let expandedSeats = new Set(); let isMyCardsPeeked = false;
        let audioCtx; 
        let lastGameState = 'waiting'; let isDealingAnimationPlaying = false; 
        let previousChips = {}; let previousCommunityCount = 0; let dealtCards = new Set(); 

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playChipSound() { if (!audioCtx || audioCtx.state === 'suspended') return; const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(4000 + Math.random() * 2000, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(8000, audioCtx.currentTime + 0.03); gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }
        function playCardSound() { if (!audioCtx || audioCtx.state === 'suspended') return; const bufferSize = audioCtx.sampleRate * 0.08; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; const noise = audioCtx.createBufferSource(); noise.buffer = buffer; const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 1000; const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08); noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start(); }
        function playCashSound() { if (!audioCtx || audioCtx.state === 'suspended') return; const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.1); gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }

        function spawnChips(amount, visualIdx) {
            const container = document.getElementById('chips-container');
            const betZones = { 0: { left: 50, top: 78 }, 1: { left: 25, top: 70 }, 2: { left: 15, top: 50 }, 3: { left: 25, top: 30 }, 4: { left: 50, top: 22 }, 5: { left: 75, top: 30 }, 6: { left: 85, top: 50 }, 7: { left: 75, top: 70 } };
            const zone = betZones[visualIdx] || {left: 50, top: 50};
            const denoms = [ { val: 500, color: '#8e44ad' }, { val: 100, color: '#2c3e50' }, { val: 50, color: '#e74c3c' }, { val: 10, color: '#3498db' }, { val: 1, color: '#ecf0f1' } ];
            let remaining = amount; let chipsToThrow = [];
            for (let d of denoms) { while (remaining >= d.val) { chipsToThrow.push(d); remaining -= d.val; if(chipsToThrow.length >= 25) break; } if(chipsToThrow.length >= 25) break; }
            chipsToThrow.forEach((chip, i) => { setTimeout(() => { const el = document.createElement('div'); el.className = 'chip-token'; el.style.backgroundColor = chip.color; if (chip.val >= 10) el.innerText = chip.val; const scatterX = (Math.random() - 0.5) * 8; const scatterY = (Math.random() - 0.5) * 8; el.style.left = `calc(${zone.left}% + ${scatterX}vw)`; el.style.top = `calc(${zone.top}% + ${scatterY}vw)`; el.style.setProperty('--rot', `${Math.random()*360}deg`); container.appendChild(el); playChipSound(); }, i * 35); });
        }

        async function playDealingAnimation(activeVisualIndices) {
            isDealingAnimationPlaying = true;
            const deck = document.getElementById('deck-container'); const container = document.getElementById('chips-container'); const controlBar = document.getElementById('control-bar');
            if (controlBar) controlBar.style.display = 'none'; 
            const spawnFlyingCard = (targetClass) => {
                return new Promise(resolve => {
                    const targetElement = document.querySelector('.' + targetClass); if (!targetElement) { resolve(); return; } let targetRect = targetElement.getBoundingClientRect(); if (targetRect.width === 0) { resolve(); return; }
                    const card = document.createElement('div'); card.className = 'card flying-card hidden-bg'; card.style.left = deck.offsetLeft + 'px'; card.style.top = deck.offsetTop + 'px'; card.style.transform = 'translate(-50%, -50%) scale(0.5)'; container.appendChild(card); playCardSound();
                    setTimeout(() => { const containerRect = container.getBoundingClientRect(); card.style.left = (targetRect.left - containerRect.left + targetRect.width/2) + 'px'; card.style.top = (targetRect.top - containerRect.top + targetRect.height/2) + 'px'; card.style.transform = 'translate(-50%, -50%) scale(1)'; }, 20);
                    setTimeout(() => { card.remove(); dealtCards.add(targetClass); let el = document.querySelector('.' + targetClass); if (el) el.style.opacity = '1'; resolve(); }, 320);
                });
            };
            try { for (let round = 0; round < 2; round++) { for (let vIdx of activeVisualIndices) await spawnFlyingCard(`hole-card-anim-${vIdx}-${round}`); } for (let i = 0; i < 5; i++) await spawnFlyingCard(`comm-card-anim-${i}`); } catch (e) { console.error("动画跳过", e); }
            isDealingAnimationPlaying = false; if (controlBar) controlBar.style.display = 'flex';
        }

        socket.on('settlePot', (data) => {
            const chips = document.querySelectorAll('.chip-token');
            if (chips.length > 0 && data.winners.length > 0) {
                let visualIdx = getVisualSeatId(data.winners[0]); let avatarEl = document.querySelector(`#seat-${visualIdx} .avatar`);
                if (avatarEl) {
                    let targetRect = avatarEl.getBoundingClientRect(); let containerRect = document.getElementById('chips-container').getBoundingClientRect(); let targetX = targetRect.left + targetRect.width / 2 - containerRect.left; let targetY = targetRect.top + targetRect.height / 2 - containerRect.top;
                    chips.forEach((chip, i) => { setTimeout(() => { chip.style.transition = 'all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1)'; chip.style.left = targetX + 'px'; chip.style.top = targetY + 'px'; chip.style.transform = 'translate(-50%, -50%) scale(0.2)'; chip.style.opacity = '0'; }, i * 15); });
                }
            }
            setTimeout(() => {
                data.winners.forEach(wIdx => { let vIdx = getVisualSeatId(wIdx); let seatEl = document.getElementById(`seat-${vIdx}`); if(seatEl) { let floatText = document.createElement('div'); floatText.innerText = `+${data.splitPot || data.pot}`; floatText.className = 'float-money'; seatEl.appendChild(floatText); setTimeout(() => floatText.remove(), 1500); } });
                playCashSound();
            }, 600); 
        });

        function getVisualSeatId(serverSeatIdx) { if (mySeatIndex === -1) return serverSeatIdx; return (serverSeatIdx - mySeatIndex + 8) % 8; }
        
        function toggleSeat(visualIdx) { const panel = document.getElementById(`seat-${visualIdx}`).querySelector('.player-panel'); if (expandedSeats.has(visualIdx)) { expandedSeats.delete(visualIdx); if (panel) panel.classList.remove('expanded'); } else { expandedSeats.add(visualIdx); if (panel) panel.classList.add('expanded'); } }
        function toggleMyCards() { isMyCardsPeeked = !isMyCardsPeeked; document.querySelectorAll('.my-card-container').forEach(el => { if (isMyCardsPeeked) el.classList.add('peeked'); else el.classList.remove('peeked'); }); }
        
        function createFlippableCardHTML(cardData, isMine = false, forceFaceDown = false, extraClass = '', extraStyle = '', isNewlyRevealed = false, forcePeek = false) {
            let innerContent = '';
            if (forceFaceDown || !cardData || cardData === 'hidden') { innerContent = `<div class="flip-front"></div><div class="flip-back hidden-bg"></div>`; } 
            else { const isRed = cardData.suit === '♥️' || cardData.suit === '♦️'; innerContent = `<div class="flip-front"></div><div class="flip-back ${isRed ? 'red' : ''}">${cardData.suit}${cardData.rank}</div>`; }
            let peekClass = '';
            if (forcePeek && !forceFaceDown && cardData !== 'hidden') { peekClass = 'peeked'; } 
            else if (!forceFaceDown && cardData && cardData !== 'hidden' && !isMine) { if (!isNewlyRevealed) peekClass = 'peeked'; }
            const myClass = isMine ? 'my-card-container ' + ((isMyCardsPeeked || forcePeek) ? 'peeked' : '') : '';
            const clickEvent = (isMine && !forcePeek) ? 'onclick="toggleMyCards()"' : '';
            return `<div class="card flip-container ${myClass} ${peekClass} ${extraClass}" style="${extraStyle}" ${clickEvent}><div class="flip-inner">${innerContent}</div></div>`;
        }
        
        function joinGame() { initAudio(); const name = document.getElementById('username').value; const pwd = document.getElementById('password').value; if (name && pwd) socket.emit('login', {username: name, password: pwd}); else document.getElementById('login-error-msg').innerText = "账号或密码不能为空！"; }
        socket.on('loginError', (msg) => { document.getElementById('login-error-msg').innerText = msg; });
        socket.on('loginSuccess', (seatIdx) => { mySeatIndex = seatIdx; document.getElementById('login-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'block'; document.getElementById('top-bar').style.display = 'block'; });
        function changePassword() { const oldPwd = document.getElementById('old-pwd').value; const newPwd = document.getElementById('new-pwd').value; if (oldPwd && newPwd) socket.emit('changePassword', { oldPassword: oldPwd, newPassword: newPwd }); }
        socket.on('passwordChanged', (msg) => { alert(msg); document.getElementById('password-modal').style.display='none'; });
        socket.on('passwordChangeFailed', (msg) => { alert(msg); });

        socket.on('updateTable', (data) => {
            let triggerDealAnim = false;
            if (lastGameState === 'waiting' && data.gameState === 'pre-flop') { triggerDealAnim = true; isDealingAnimationPlaying = true; dealtCards.clear(); document.getElementById('chips-container').innerHTML = ''; }
            lastGameState = data.gameState;

            if (data.gameState === 'waiting' && data.communityCards.length === 0) { isMyCardsPeeked = false; previousCommunityCount = 0; }

            let newCommCount = data.communityCards.length; let newlyRevealedIndices = [];
            if (newCommCount > previousCommunityCount && data.gameState !== 'waiting') { for(let i = previousCommunityCount; i < newCommCount; i++) newlyRevealedIndices.push(i); }
            previousCommunityCount = newCommCount;

            for(let i = 0; i < 8; i++) {
                const p = data.seats[i];
                if(p) {
                    if(previousChips[p.id] !== undefined && data.gameState !== 'waiting') {
                        let spent = previousChips[p.id] - p.chips;
                        if(spent > 0) spawnChips(spent, getVisualSeatId(i));
                    }
                    previousChips[p.id] = p.chips;
                }
            }

            document.getElementById('pot-display').innerText = data.pot;
            const stageNames = { 'waiting': '等待开始...', 'pre-flop': '翻牌前', 'flop': '翻牌圈', 'turn': '转牌圈', 'river': '河牌圈', 'showdown': '🚨 玩家亮牌对峙！ 🚨' };
            document.getElementById('stage-display').innerText = stageNames[data.gameState];
            
            if (window.isLbExpanded === undefined) { window.isLbExpanded = window.innerWidth > 768; }
            window.toggleLeaderboard = function() {
                window.isLbExpanded = !window.isLbExpanded;
                document.getElementById('lb-content').style.display = window.isLbExpanded ? 'block' : 'none';
                document.getElementById('lb-toggle-icon').innerText = window.isLbExpanded ? '🔽' : '▶️';
            };

            let displayStyle = window.isLbExpanded ? 'block' : 'none';
            let icon = window.isLbExpanded ? '🔽' : '▶️';
            
            let lbHTML = `<div class="lb-title" onclick="toggleLeaderboard()" style="cursor:pointer; margin: 0;">🏆 财富榜 <span id="lb-toggle-icon">${icon}</span></div>
                          <div id="lb-content" style="display: ${displayStyle}; margin-top: 8px;">
                          <table class="lb-table"><tr><th>玩家</th><th>资产</th><th>欠款</th></tr>`;
            let activePlayers = data.seats.filter(s => s !== null).sort((a,b) => (b.chips - b.debt) - (a.chips - a.debt));
            activePlayers.forEach(p => { lbHTML += `<tr><td>${p.username}</td><td>${p.chips}</td><td style="color:#e74c3c;">${p.debt > 0 ? p.debt : '0'}</td></tr>`; });
            lbHTML += `</table></div>`;
            
            let lbContainer = document.getElementById('leaderboard-container');
            if(!lbContainer) { lbContainer = document.createElement('div'); lbContainer.id = 'leaderboard-container'; document.getElementById('game-screen').appendChild(lbContainer); }
            lbContainer.innerHTML = lbHTML;

            let isDisplayPhase = (data.gameState === 'showdown' || (data.gameState === 'waiting' && data.communityCards.length > 0));

            let boardHTML = '';
            for (let i = 0; i < 5; i++) {
                let cData = data.communityCards[i]; 
                if (data.gameState === 'waiting' && data.communityCards.length === 0) { boardHTML += `<div class="card-slot"></div>`; } 
                else if (data.gameState === 'waiting' && cData) { boardHTML += createFlippableCardHTML(cData, false, false, `comm-card-anim-${i}`, 'opacity:1;', false, true); } 
                else { let isNew = newlyRevealedIndices.includes(i); let targetClass = `comm-card-anim-${i}`; let extraClass = targetClass + ' ' + (isNew ? 'needs-flip' : ''); let extraStyle = (isDealingAnimationPlaying && !dealtCards.has(targetClass)) ? 'opacity:0;' : 'opacity:1;'; boardHTML += createFlippableCardHTML(cData, false, !cData, extraClass, extraStyle, isNew); }
            }
            document.getElementById('community-cards-container').innerHTML = boardHTML;
            
            for (let i = 0; i < 8; i++) {
                const visualIdx = getVisualSeatId(i); const seatDiv = document.getElementById(`seat-${visualIdx}`); const player = data.seats[i];
                if (!player) { seatDiv.innerHTML = `<div class="player-panel" style="opacity:0.3"><div class="nickname">空位</div></div>`; continue; }
                
                let holeCardsHTML = '';
                if (player.holeCards && player.holeCards.length > 0) {
                    let isMine = (i === mySeatIndex);
                    holeCardsHTML = `<div class="hole-cards">` + player.holeCards.map((c, idx) => { let targetClass = `hole-card-anim-${visualIdx}-${idx}`; let extraStyle = (isDealingAnimationPlaying && !dealtCards.has(targetClass)) ? 'opacity:0;' : 'opacity:1;'; return createFlippableCardHTML(c, isMine, false, targetClass, extraStyle, false, isDisplayPhase); }).join('') + `</div>`;
                }

                const isTurn = (data.currentTurnSeatIdx === i) ? 'active-turn' : ''; const isExpanded = expandedSeats.has(visualIdx) ? 'expanded' : '';
                const crownHTML = player.isWinner ? `<div class="crown">👑</div>` : '';
                let roleHTML = ''; if (player.role === '庄') roleHTML = `<div class="role-badge dealer">D</div>`; else if (player.role === '小盲') roleHTML = `<div class="role-badge sb">SB</div>`; else if (player.role === '大盲') roleHTML = `<div class="role-badge bb">BB</div>`;
                
                let statusText = ''; 
                if (player.isDisconnected) statusText = '🔌 掉线中';
                else if (player.status === 'folded') statusText = '(弃牌)'; 
                else if (player.status === 'spectator') statusText = '(观战)';

                const statusColor = player.isDisconnected ? '#e67e22' : (player.isReady ? '#2ecc71' : (player.status === 'folded' ? '#e74c3c' : (player.status === 'spectator' ? '#7f8c8d' : '#bdc3c7')));
                const avatarOpacity = (player.status === 'spectator' || player.isDisconnected) ? '0.5' : '1'; 

                seatDiv.innerHTML = `
                    <div class="player-panel ${isTurn} ${isExpanded}" onclick="toggleSeat(${visualIdx})">
                        ${crownHTML} ${roleHTML}
                        <div class="player-basic" style="opacity: ${avatarOpacity}"><div class="avatar">${player.avatar}</div><div class="chips" style="color:${statusColor}">💰 ${player.chips}</div></div>
                        <div class="player-details"><div class="details-avatar">${player.avatar}</div><div class="details-name" style="color:${statusColor}">${player.username} ${statusText}</div>
                        <div class="details-info">资产: <span>💰 ${player.chips}</span><br>欠款: <span style="color:#e74c3c;">🏦 ${player.debt > 0 ? player.debt : 0}</span><br>本轮: <span>💵 ${player.roundBet}</span></div></div>
                    </div>
                    ${holeCardsHTML}
                `;
            }
            
            const bar = document.getElementById('control-bar'); bar.innerHTML = ''; 
            const me = data.seats[mySeatIndex]; if (!me) return;
            
            if (me.status === 'spectator') {
                bar.innerHTML = `<span style="color:#95a5a6; font-size:18px; font-weight:bold;">👀 观战中</span>
                                 <button style="background:#e74c3c;color:white; margin-left:15px; box-shadow: 0 0 10px #e74c3c;" onclick="initAudio(); socket.emit('borrow')">🏦 借款 1000</button>`;
            }
            else if ((data.gameState === 'waiting') && !me.isReady) { 
                bar.innerHTML = `<button style="background:#2ecc71;color:white;" onclick="initAudio(); socket.emit('ready')">✅ 准备开始</button>`; 
                if (me.debt > 0 && me.chips > 0) {
                    bar.innerHTML += `<button style="background:#e67e22;color:white; margin-left:15px;" onclick="socket.emit('repay')">💸 还款 (欠 ${me.debt})</button>`;
                }
            } 
            else if ((data.gameState === 'waiting') && me.isReady) { 
                bar.innerHTML = `<span style="color:#2ecc71; font-size:18px;">✅ 等待其他人...</span>`; 
            }
            else if (data.gameState !== 'waiting' && me.status === 'waiting') {
                bar.innerHTML = `<span style="color:#f1c40f; font-size:18px;">⏳ 等待本局结束后加入...</span>`;
            }
            else if (data.gameState === 'showdown' && me.status === 'playing') {
                if (!me.hasRevealed) bar.innerHTML = `<button style="background:#e67e22;color:white;box-shadow: 0 0 15px #e67e22; font-size: 20px;" onclick="socket.emit('revealCards')">🃏 亮出你的底牌！</button>`;
                else bar.innerHTML = `<span style="color:#e67e22; font-size:18px;">👀 等待其他对手亮牌...</span>`;
            }
            else if (data.gameState !== 'waiting' && data.gameState !== 'showdown' && data.currentTurnSeatIdx === mySeatIndex) {
                let callDiff = data.currentHighestBet - me.roundBet; 
                bar.innerHTML += `<button style="background:#95a5a6;color:white;" onclick="socket.emit('playerAction', {type: 'fold'})">🏳️ 弃牌</button>`;
                if (callDiff === 0) bar.innerHTML += `<button style="background:#f39c12;color:white;" onclick="socket.emit('playerAction', {type: 'check'})">✊ 过牌 (Check)</button>`;
                else if (me.chips > callDiff) bar.innerHTML += `<button style="background:#3498db;color:white;" onclick="socket.emit('playerAction', {type: 'call'})">💵 跟注 (补 ${callDiff})</button>`;
                
                let maxRaise = me.chips - callDiff;
                if (maxRaise > 0) {
                    let raiseAmounts = [50, 100, 200, 500, 1000, 2000];
                    let availableRaises = raiseAmounts.filter(amt => amt <= maxRaise);
                    if (availableRaises.length === 0) availableRaises.push(maxRaise);

                    let raiseMenuHTML = `<div id="raise-menu" style="display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: rgba(22, 33, 62, 0.95); border: 2px solid #e74c3c; border-radius: 10px; padding: 10px; flex-direction: column; gap: 8px; min-width: 100px; box-shadow: 0 5px 20px rgba(0,0,0,0.9); z-index: 200;">`;
                    availableRaises.forEach(amt => {
                        raiseMenuHTML += `<button style="background: #c0392b; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 14px; box-shadow: none; margin: 0;" onclick="socket.emit('playerAction', {type: 'raise', amount: ${amt}}); document.getElementById('raise-menu').style.display='none';">+ ${amt}</button>`;
                    });
                    raiseMenuHTML += `</div>`;

                    bar.innerHTML += `
                    <div style="position: relative; display: flex; flex: 1; min-width: max-content; margin: 0 2px;">
                        <button style="background:#e74c3c; color:white; width: 100%; margin: 0; padding: 10px 15px; font-size: 16px; border-radius: 5px; font-weight: bold; border: none; cursor: pointer;" onclick="let m = document.getElementById('raise-menu'); m.style.display = (m.style.display === 'flex' ? 'none' : 'flex');">🔥 加注...</button>
                        ${raiseMenuHTML}
                    </div>`;
                }
                
                if (me.chips > 0) bar.innerHTML += `<button style="background:#8e44ad;color:white;box-shadow: 0 0 10px #8e44ad;" onclick="socket.emit('playerAction', {type: 'all-in'})">🌋 All-In (${me.chips})</button>`;
            }

            if ((triggerDealAnim || isDealingAnimationPlaying) && bar) { bar.style.display = 'none'; } else if (bar) { bar.style.display = 'flex'; }

            if (newlyRevealedIndices.length > 0) {
                let delay = 50;
                newlyRevealedIndices.forEach((idx) => { setTimeout(() => { let el = document.querySelector(`.comm-card-anim-${idx}`); if (el) { el.classList.add('peeked'); el.classList.remove('needs-flip'); playCardSound(); } }, delay); delay += 200; });
            }

            if (triggerDealAnim) {
                let activeVisualIndices = data.seats.map((s, i) => s && s.status === 'playing' ? getVisualSeatId(i) : -1).filter(v => v !== -1);
                playDealingAnimation(activeVisualIndices);
            }
        });
        
        function sendChat(textOverride) {
            if (isChatCooldown) {
                const input = document.getElementById('chat-input');
                input.placeholder = "🤐 说话太快啦，歇会吧！"; input.value = '';
                setTimeout(() => { input.placeholder = "嘲讽一下..."; }, 1500); return;
            }
            const input = document.getElementById('chat-input');
            const msg = textOverride || input.value.trim(); 
            if (msg) {
                socket.emit('chatMessage', msg);
                if (!textOverride) input.value = ''; 
                isChatCooldown = true; setTimeout(() => { isChatCooldown = false; }, CHAT_COOLDOWN_TIME);
            }
        }

        socket.on('chatBubble', (data) => { 
            const visualIdx = getVisualSeatId(data.seatIdx); 
            const seatDiv = document.getElementById(`seat-${visualIdx}`); 
            if (!seatDiv) return; 

            if (audioCache[data.text]) {
                audioCache[data.text].currentTime = 0; 
                audioCache[data.text].play().catch(e => console.log("等待用户交互后才能播放语音")); 
            }

            const bubble = document.createElement('div'); 
            bubble.className = 'chat-bubble'; 
            bubble.innerText = data.text; 
            seatDiv.appendChild(bubble); 
            setTimeout(() => { bubble.remove(); }, 3000); 
        });
    </script>
</body>
</html>
